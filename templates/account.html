<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Account | Antifaschistischer Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css?v=phase2-pride-1">
</head>
<body class="account-page phase2-page">

<div class="bg-layer"></div>
<div class="bg-grid"></div>
<div class="bg-pride"></div>
<div class="phase2-orbit"></div>

<div class="account-card phase2-card">
    <a class="account-back" href="/">← zurück zum Chat</a>

    <div class="auth-badge">Account Verwaltung</div>
    <h1>DEIN ACCOUNT</h1>

    {% if msg %}
        <div class="account-msg">{{ msg }}</div>
    {% endif %}

    <div class="account-preview">
        {% if user["profile_picture"] %}
            <img class="account-avatar-img" src="{{ user['profile_picture'] }}" alt="Profilbild">
        {% else %}
            <div class="account-avatar">{{ user["avatar"] }}</div>
        {% endif %}

        <div class="account-preview-text">
            <b>{{ user["username"] }}</b>
            <span>{{ user["role"] }} · {{ user["pronouns"] }} · {{ user["age"] }}</span>
            <small>{{ user["party"] }} · {{ user["sexuality"] }}</small>
        </div>
    </div>

    <form method="POST" class="account-form" enctype="multipart/form-data">
        <input type="hidden" name="action" value="profile">

        <label>Profilbild</label>
        <input name="profile_picture" type="file" accept="image/png,image/jpeg,image/gif,image/webp">

        <label>Fallback Avatar / Emoji</label>
        <input name="avatar" value="{{ user['avatar'] }}" maxlength="4">

        <label>Pronomen</label>
        <input name="pronouns" value="{{ user['pronouns'] }}" required>

        <label>Alter</label>
        <input name="age" type="number" min="13" max="120" value="{{ user['age'] }}" required>

        <label>Sexualität</label>
        <select name="sexuality" required>
            <option value="{{ user['sexuality'] }}">Aktuell: {{ user["sexuality"] }}</option>
            <option value="Keine Angabe">Keine Angabe</option>
            <option value="Heterosexuell">Heterosexuell</option>
            <option value="Homosexuell / schwul">Homosexuell / schwul</option>
            <option value="Homosexuell / lesbisch">Homosexuell / lesbisch</option>
            <option value="Bisexuell">Bisexuell</option>
            <option value="Pansexuell">Pansexuell</option>
            <option value="Asexuell">Asexuell</option>
            <option value="Aromantisch">Aromantisch</option>
            <option value="Demisexuell">Demisexuell</option>
            <option value="Queer">Queer</option>
            <option value="Questioning / unsicher">Questioning / unsicher</option>
            <option value="Omnisexuell">Omnisexuell</option>
            <option value="Polysexuell">Polysexuell</option>
            <option value="Sapiosexuell">Sapiosexuell</option>
            <option value="Graysexuell">Graysexuell</option>
            <option value="Androsexuell">Androsexuell</option>
            <option value="Gynosexuell">Gynosexuell</option>
            <option value="Skoliosexuell / Ceterosexuell">Skoliosexuell / Ceterosexuell</option>
            <option value="Abrosexuell">Abrosexuell</option>
            <option value="Andere / Selbstbezeichnung">Andere / Selbstbezeichnung</option>
        </select>

        <label>Partei / politische Angabe</label>
        <select name="party" required>
            <option value="{{ user['party'] }}">Aktuell: {{ user["party"] }}</option>
            <option value="Keine Angabe">Keine Angabe</option>
            <option value="Parteilos">Parteilos</option>
            <option value="SPD">SPD</option>
            <option value="Bündnis 90/Die Grünen">Bündnis 90/Die Grünen</option>
            <option value="Die Linke">Die Linke</option>
            <option value="Die PARTEI">Die PARTEI</option>
            <option value="Piratenpartei">Piratenpartei</option>
            <option value="Tierschutzpartei">Tierschutzpartei</option>
            <option value="FDP (kritisch)">FDP (kritisch)</option>
            <option value="CDU/CSU (kritisch)">CDU/CSU (kritisch)</option>
            <option value="AfD (kritisch)">AfD (kritisch)</option>
            <option value="BSW (kritisch)">BSW (kritisch)</option>
            <option value="Freie Wähler (kritisch)">Freie Wähler (kritisch)</option>
            <option value="Volt (kritisch)">Volt (kritisch)</option>
            <option value="Andere (kritisch)">Andere (kritisch)</option>
        </select>

        <label>Theme</label>
        <select name="theme">
            <option value="{{ user['theme'] }}">Aktuell: {{ user["theme"] }}</option>
            <option value="red">Rot/Schwarz</option>
            <option value="neon">Neon</option>
            <option value="compact">Compact</option>
        </select>

        <button>Profil speichern</button>
    </form>

    <form method="POST" class="account-form">
        <input type="hidden" name="action" value="password">

        <label>Altes Passwort</label>
        <input name="old_password" type="password">

        <label>Neues Passwort</label>
        <input name="new_password" type="password">

        <button>Passwort ändern</button>
    </form>
</div>

</body>
</html>
