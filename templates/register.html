<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Register | Antifaschistischer Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css?v=login-final-1">
</head>

<body class="auth-body">

<div class="background"></div>
<div class="grid-layer"></div>

<div class="auth-card">
    <div class="circle-logo big-logo">
        <span></span>
        <span></span>
    </div>

    <h1>REGISTER</h1>
    <p>Account erstellen</p>

    <form method="POST" action="/register">
        <input name="username" placeholder="Username" autocomplete="username" required>
        <input name="password" type="password" placeholder="Passwort" autocomplete="new-password" required>
        <button>REGISTRIEREN</button>
    </form>

    <a href="/login">Schon Account? Login</a>
</div>

</body>
</html>
