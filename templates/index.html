<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antifaschistischer Chat</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #121212;
            color: white;
        }

        .container {
            max-width: 800px;
            margin: auto;
            padding: 16px;
        }

        h1 {
            text-align: center;
            font-size: 22px;
            margin-bottom: 20px;
        }

        /* Inputs full mobile width */
        form {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
        }

        button {
            padding: 12px 14px;
            border-radius: 10px;
            border: none;
            background: #2196F3;
            color: white;
            cursor: pointer;
            white-space: nowrap;
        }

        .add button {
            background: #4CAF50;
        }

        /* Notes */
        .note {
            background: #1e1e1e;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            position: relative;
        }

        .time {
            font-size: 11px;
            opacity: 0.6;
            margin-bottom: 6px;
        }

        .delete {
            position: absolute;
            right: 10px;
            top: 10px;
            color: red;
            text-decoration: none;
            font-size: 18px;
        }

        /* 📱 MOBILE OPTIMIZATION */
        @media (max-width: 600px) {

            h1 {
                font-size: 18px;
            }

            form {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Antifaschistischer Chat</h1>

    <!-- 🔍 Suche -->
    <form method="get" action="/">
        <input name="q" placeholder="🔍 Suche..." value="{{ q }}">
        <button>Suche</button>
    </form>

    <!-- ➕ Add -->
    <form class="add" action="/speichern" method="post">
        <input name="notiz" placeholder="Neue Notiz...">
        <button>+</button>
    </form>

    <!-- 📝 Notes -->
    {% for id, text, zeit in notizen %}
    <div class="note">

        <a class="delete" href="/loeschen/{{ id }}">🗑️</a>

        <div class="time">{{ zeit }}</div>
        <div class="text">{{ text }}</div>

    </div>
    {% endfor %}

</div>

</body>
</html>
