<!DOCTYPE html>
<html>
<head>
<title>Chat</title>
<style>
body { background:#0a0a0a; color:white; font-family:Arial; }

.chat { height:70vh; overflow-y:auto; display:flex; flex-direction:column; gap:10px; }

.msg { background:#151515; padding:10px; border-left:4px solid red; }

.name { color:red; font-weight:bold; }
</style>
</head>
<body>

<h2>Chat – eingeloggt als {{ user }}</h2>
<a href="/logout">Logout</a>

<div class="chat" id="chat"></div>

<form id="form">
    <input id="text" placeholder="Nachricht">
    <button>Senden</button>
</form>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const socket = io();
const chat = document.getElementById("chat");
const user = "{{ user }}";

document.getElementById("form").addEventListener("submit", (e) => {
    e.preventDefault();

    socket.emit("send_message", {
        name: user,
        text: document.getElementById("text").value
    });

    document.getElementById("text").value = "";
});

socket.on("new_message", (msg) => {
    const div = document.createElement("div");
    div.className = "msg";

    div.innerHTML = `
        <div class="name">${msg.name}</div>
        <div>${msg.text}</div>
        <div>${msg.zeit}</div>
    `;

    chat.appendChild(div);
});
</script>

</body>
</html>
