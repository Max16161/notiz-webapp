<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Login | Antifaschistischer Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css?v=phase2-pride-1">
</head>
<body class="auth-page">

<div class="bg-layer"></div>
<div class="bg-grid"></div>
<div class="bg-pride"></div>

<div class="auth-wrap">
    <div class="auth-box">
        <div class="auth-badge">Pride Month Edition</div>
        <h1>ANTIFASCHISTISCHER CHAT</h1>
        <p>Login für solidarische, antifaschistische und queere Community.</p>

        <form method="POST" class="auth-form">
            <label>Username</label>
            <input name="username" placeholder="Username">

            <label>Passwort</label>
            <input name="password" type="password" placeholder="Passwort">

            <button>Einloggen</button>
        </form>

        <div class="auth-links">
            <a href="/register">Registrieren</a>
        </div>
    </div>
</div>

</body>
</html>
